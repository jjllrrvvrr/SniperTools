<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Tools</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sniper Tools">
    <style>
        .tools-grid {
            margin-top: 40px;
        }

        .tool-card {
            box-shadow: var(--shadow);
        }

        .tool-card:hover {
            box-shadow: var(--shadow);
        }

        .tool-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .tool-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .tool-card {
                padding: 30px 20px;
            }

            .tool-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <img src="logo.png" alt="Logo" class="logo">
                <div>
                    <h1>Sniper Tools</h1>
                    <div class="subtitle">Shooting Solutions</div>
                </div>
            </div>
            <div class="theme-toggle">
                <button class="toggle-btn" id="themeToggle" data-active="false" aria-label="Toggle dark mode"><span class="slider"></span></button>
            </div>
        </header>

        <div class="tools-grid">
            <a href="loophole.html" class="tool-card">
                <div class="tool-icon">🕳️</div>
                <h2>Loophole</h2>
                <div class="arrow">→</div>
            </a>

            <a href="rangefinder.html" class="tool-card">
                <div class="tool-icon">🎯</div>
                <h2>Range Finder</h2>
                <div class="arrow">→</div>
            </a>

            <a href="mgrscalculator.html" class="tool-card">
                <div class="tool-icon">🗺️</div>
                <h2>MGRS Calculator</h2>
                <div class="arrow">→</div>
            </a>

            <a href="converter.html" class="tool-card">
                <div class="tool-icon">🔄</div>
                <h2>Unit Converter</h2>
                <div class="arrow">→</div>
            </a>

            <a href="globaltime.html" class="tool-card">
                <div class="tool-icon">🕐</div>
                <h2>Global Time</h2>
                <div class="arrow">→</div>
            </a>

            <a href="weather.html" class="tool-card">
                <div class="tool-icon">🌤️</div>
                <h2>Weather</h2>
                <div class="arrow">→</div>
            </a>

            <a href="spottertest.html" class="tool-card">
                <div class="tool-icon">🔭</div>
                <h2>Spotter Test</h2>
                <div class="arrow">→</div>
            </a>

            <a href="usefull.html" class="tool-card">
                <div class="tool-icon">🔗</div>
                <h2>Useful Links</h2>
                <div class="arrow">→</div>
            </a>

            <a href="jd.html" class="tool-card">
                <div class="tool-icon">📏</div>
                <h2>Judging Distance Skills</h2>
                <div class="arrow">→</div>
            </a>
        </div>

        <div class="github-section">
            <a href="https://github.com/jjllrrvvrr" target="_blank" rel="noopener noreferrer" aria-label="View GitHub profile" class="github-link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.24 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        function loadTheme() {
            const savedTheme = localStorage.getItem('sniperTheme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
            }
        }

        function toggleTheme() {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                themeToggle.setAttribute('data-active', 'false');
                localStorage.setItem('sniperTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
                localStorage.setItem('sniperTheme', 'dark');
            }
        }

        themeToggle.addEventListener('click', toggleTheme);
        loadTheme();
    </script>
</body>
</html>
