<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Tools - Range Finder</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sniper Tools">
    <style>
        /* Range Finder specific styles */
        
        /* Layout principal */
        .controls-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            align-items: end;
        }
        
        /* Section Target Size */
        .target-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .target-section label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            height: 18px;
            line-height: 18px;
        }
        
        .target-section select {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        
        .target-section select:focus {
            outline: none;
            border-color: var(--text-primary);
        }
        
        .custom-size {
            display: none;
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-mono);
            text-align: center;
            transition: border-color 0.3s ease;
            margin-top: 10px;
        }
        
        .custom-size.visible {
            display: block;
        }
        
        .custom-size:focus {
            outline: none;
            border-color: var(--text-primary);
        }
        
        /* Section Mils */
        .mils-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .mils-section label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            height: 18px;
            line-height: 18px;
        }
        
        .mils-input-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            height: 50px;
        }
        
        .slider-container {
            flex: 1;
            position: relative;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: var(--border);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--text-primary);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--bg-secondary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: var(--text-primary);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--bg-secondary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        
        .mils-number {
            width: 90px;
            height: 50px;
            padding: 0 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1.2rem;
            font-family: var(--font-mono);
            font-weight: 700;
            text-align: center;
            transition: border-color 0.3s ease;
        }
        
        .mils-number:focus {
            outline: none;
            border-color: var(--text-primary);
        }
        
        /* Result section */
        .result-section {
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-hover) 100%);
            color: var(--bg-color);
            padding: 35px;
            border-radius: 12px;
            text-align: center;
            margin: 30px 0;
        }
        
        .result-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .result-value {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: var(--font-mono);
            line-height: 1;
        }
        
        .result-unit {
            font-size: 1.5rem;
            opacity: 0.8;
            margin-left: 8px;
        }
        
        /* Formula section */
        .formula-section {
            background-color: var(--bg-color);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .formula-text {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--text-secondary);
        }
        
        .formula-text strong {
            color: var(--text-primary);
        }
        
        .formula-values {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .result-value {
                font-size: 2.5rem;
            }
            
            .result-unit {
                font-size: 1.2rem;
            }
            
            .mils-input-wrapper {
                flex-direction: column;
                gap: 15px;
                height: auto;
            }
            
            .slider-container {
                width: 100%;
            }
            
            .mils-number {
                width: 100%;
                height: 50px;
            }
        }
        
        @media (max-width: 480px) {
            .result-value {
                font-size: 2rem;
            }
            
            .target-section select,
            .custom-size,
            .mils-number {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            input[type="range"]::-webkit-slider-thumb {
                width: 32px;
                height: 32px;
            }
            
            input[type="range"]::-moz-range-thumb {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <a href="index.html" aria-label="Back to home">
                    <img src="logo.png" alt="Logo" class="logo">
                </a>
                <div>
                    <h1>Sniper Tools</h1>
                    <div class="subtitle">Range Finder</div>
                </div>
            </div>
            <div class="theme-toggle">
                <button class="toggle-btn" id="themeToggle" data-active="false" aria-label="Toggle dark mode"><span class="slider"></span></button>
            </div>
        </header>

        <div class="card">
            <div class="controls-grid">
                <div class="target-section">
                    <label for="targetSize">Target Size</label>
                    <select id="targetSize">
                        <option value="180" selected>Standing man (180 cm)</option>
                        <option value="120">Crouched man (120 cm)</option>
                        <option value="90">Backpack (90 cm)</option>
                        <option value="50">Head/shoulders (50 cm)</option>
                        <option value="30">Head only (30 cm)</option>
                        <option value="25">Helmet (25 cm)</option>
                        <option value="150">Tire diameter (150 cm)</option>
                        <option value="400">Vehicle width (400 cm)</option>
                        <option value="custom">Custom size...</option>
                    </select>
                    <input type="number" id="customSize" class="custom-size" placeholder="Enter size in cm" min="1" max="500">
                </div>

                <div class="mils-section">
                    <label for="milsInput">Mils Observed</label>
                    <div class="mils-input-wrapper">
                        <div class="slider-container">
                            <input type="range" id="milsSlider" min="0.1" max="10" step="0.1" value="2.5" aria-label="Mils slider">
                        </div>
                        <input type="number" id="milsInput" class="mils-number" min="0.1" max="10" step="0.1" value="2.5" aria-label="Mils value">
                    </div>
                </div>
            </div>
        </div>

        <div class="result-section">
            <div class="result-label">Distance</div>
            <div class="result-value">
                <span id="finalResult">720</span><span class="result-unit">m</span>
            </div>
        </div>

        <div class="formula-section">
            <div class="formula-text">
                <strong>Formula:</strong> (<span class="formula-values" id="sizeDisplay">1.8</span> m / <span class="formula-values" id="milsDisplay">2.5</span> mils) × 1000 = <strong><span class="formula-values" id="calcResult">720</span> m</strong>
            </div>
        </div>
    </div>

    <script>
        // Target sizes
        const targetSizes = {
            '180': { name: 'Standing man (180 cm)', cm: 180 },
            '120': { name: 'Crouched man (120 cm)', cm: 120 },
            '90': { name: 'Backpack (90 cm)', cm: 90 },
            '50': { name: 'Head/shoulders (50 cm)', cm: 50 },
            '30': { name: 'Head only (30 cm)', cm: 30 },
            '25': { name: 'Helmet (25 cm)', cm: 25 },
            '150': { name: 'Tire diameter (150 cm)', cm: 150 },
            '400': { name: 'Vehicle width (400 cm)', cm: 400 }
        };

        // Current state
        let currentSize = 180;
        let currentMils = 2.5;

        // DOM elements
        const targetSizeSelect = document.getElementById('targetSize');
        const customSizeInput = document.getElementById('customSize');
        const milsInput = document.getElementById('milsInput');
        const milsSlider = document.getElementById('milsSlider');
        const finalResult = document.getElementById('finalResult');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const milsDisplay = document.getElementById('milsDisplay');
        const calcResult = document.getElementById('calcResult');
        const themeToggle = document.getElementById('themeToggle');

        // Initialize
        function init() {
            loadTheme();
            updateCalculation();
            setupEventListeners();
        }

        // Theme toggle functions
        function loadTheme() {
            const savedTheme = localStorage.getItem('sniperTheme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                themeToggle.setAttribute('data-active', 'false');
                localStorage.setItem('sniperTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
                localStorage.setItem('sniperTheme', 'dark');
            }
        }

        // Calculate distance
        function calculateDistance(sizeCm, mils) {
            const sizeM = sizeCm / 100;
            const distanceKm = sizeM / mils;
            return Math.round(distanceKm * 1000);
        }

        // Update all displays
        function updateCalculation() {
            const distance = calculateDistance(currentSize, currentMils);
            
            finalResult.textContent = distance;
            
            sizeDisplay.textContent = (currentSize / 100).toFixed(1);
            milsDisplay.textContent = currentMils;
            calcResult.textContent = distance;
        }

        // Event listeners
        function setupEventListeners() {
            targetSizeSelect.addEventListener('change', (e) => {
                if (e.target.value === 'custom') {
                    customSizeInput.classList.add('visible');
                    customSizeInput.focus();
                } else {
                    customSizeInput.classList.remove('visible');
                    currentSize = parseInt(e.target.value);
                    updateCalculation();
                }
            });

            customSizeInput.addEventListener('input', (e) => {
                const value = parseInt(e.target.value);
                if (value && value > 0) {
                    currentSize = value;
                    updateCalculation();
                }
            });

            milsInput.addEventListener('input', (e) => {
                let value = parseFloat(e.target.value);
                if (value && value >= 0.1 && value <= 10) {
                    currentMils = value;
                    milsSlider.value = value;
                    updateCalculation();
                }
            });

            milsSlider.addEventListener('input', (e) => {
                currentMils = parseFloat(e.target.value);
                milsInput.value = currentMils;
                updateCalculation();
            });

            themeToggle.addEventListener('click', toggleTheme);
        }

        // Initialize
        init();
    </script>
</body>
</html>
