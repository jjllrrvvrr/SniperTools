<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Tools - MGRS Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* MGRS Calculator specific styles */
        .point-card {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .point-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .coord-grid {
            display: grid;
            grid-template-columns: 70px 70px 1fr 1fr;
            gap: 8px;
            align-items: end;
        }

        .coord-input {
            font-family: var(--font-mono);
            letter-spacing: 2px;
        }

        .zone-input, .square-input {
            text-transform: uppercase;
        }

        .bearing-full {
            font-size: 1.3rem;
            margin-top: 5px;
        }

        .direction-arrow {
            font-size: 1.5rem;
            margin-left: 10px;
        }

        .history-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 15px;
            align-items: center;
            padding: 12px 15px;
            background-color: var(--bg-color);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .history-coords {
            color: var(--text-secondary);
        }

        .history-result {
            color: var(--accent-color);
            font-weight: 700;
        }

        .history-bearing {
            color: var(--text-color);
        }

        .empty-history {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .coord-grid {
                grid-template-columns: 70px 70px 1fr 1fr;
                gap: 8px;
            }

            .history-item {
                grid-template-columns: 1fr;
                gap: 5px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .coord-grid {
                grid-template-columns: 60px 60px 1fr 1fr;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <a href="index.html" aria-label="Back to home">
                    <img src="logo.png" alt="Logo" class="logo">
                </a>
                <div>
                    <h1>Sniper Tools</h1>
                    <div class="subtitle">MGRS Calculator</div>
                </div>
            </div>
            <div class="theme-toggle">
                <button class="toggle-btn" id="themeToggle" data-active="false" aria-label="Toggle dark mode"><span class="slider"></span></button>
            </div>
        </header>

        <div class="card">
            <div class="grid-2" style="margin-bottom: 25px;">
                <div class="card-inner">
                    <h3 class="section-title">Point A</h3>
                    <div class="coord-grid">
                        <div class="input-group">
                            <label class="form-label">Zone</label>
                            <input type="text" id="zoneA" class="form-input mono zone-input" placeholder="38T" maxlength="3">
                        </div>
                        <div class="input-group">
                            <label class="form-label">Square</label>
                            <input type="text" id="squareA" class="form-input mono square-input" placeholder="MN" maxlength="2">
                        </div>
                        <div class="input-group">
                            <label class="form-label">Easting</label>
                            <input type="text" id="eastingA" class="form-input mono coord-input" placeholder="1234" maxlength="4" pattern="\d{4}">
                        </div>
                        <div class="input-group">
                            <label class="form-label">Northing</label>
                            <input type="text" id="northingA" class="form-input mono coord-input" placeholder="5678" maxlength="4" pattern="\d{4}">
                        </div>
                    </div>
                </div>

                <div class="card-inner">
                    <h3 class="section-title">Point B</h3>
                    <div class="coord-grid">
                        <div class="input-group">
                            <label class="form-label">Zone</label>
                            <input type="text" id="zoneB" class="form-input mono zone-input" placeholder="38T" maxlength="3">
                        </div>
                        <div class="input-group">
                            <label class="form-label">Square</label>
                            <input type="text" id="squareB" class="form-input mono square-input" placeholder="MN" maxlength="2">
                        </div>
                        <div class="input-group">
                            <label class="form-label">Easting</label>
                            <input type="text" id="eastingB" class="form-input mono coord-input" placeholder="1235" maxlength="4" pattern="\d{4}">
                        </div>
                        <div class="input-group">
                            <label class="form-label">Northing</label>
                            <input type="text" id="northingB" class="form-input mono coord-input" placeholder="5679" maxlength="4" pattern="\d{4}">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn" id="calculateBtn" style="width: 100%; margin-bottom: 25px;">Calculate</button>

            <div class="result-box" id="resultDisplay" style="display: none;">
                <div class="grid-2">
                    <div class="result-item">
                        <div class="result-label">Distance</div>
                        <div class="result-value" id="distanceValue">--</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Gisement / Bearing</div>
                        <div class="result-value bearing-full" id="bearingValue">--</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 class="section-title">History (Last 5 calculations)</h3>
            <div class="history-list" id="historyList">
                <div class="empty-history">No calculations yet</div>
            </div>
            <button class="btn btn-outline btn-small" id="clearHistory" style="display: none; margin-top: 15px;">Clear History</button>
        </div>
    </div>

    <script>
        // DOM elements
        const zoneA = document.getElementById('zoneA');
        const squareA = document.getElementById('squareA');
        const eastingA = document.getElementById('eastingA');
        const northingA = document.getElementById('northingA');
        const zoneB = document.getElementById('zoneB');
        const squareB = document.getElementById('squareB');
        const eastingB = document.getElementById('eastingB');
        const northingB = document.getElementById('northingB');
        const calculateBtn = document.getElementById('calculateBtn');
        const resultDisplay = document.getElementById('resultDisplay');
        const distanceValue = document.getElementById('distanceValue');
        const bearingValue = document.getElementById('bearingValue');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistory');
        const themeToggle = document.getElementById('themeToggle');

        // Direction arrows and labels
        const directions = [
            { label: 'N', arrow: '↑', min: 0, max: 22.5 },
            { label: 'NE', arrow: '↗', min: 22.5, max: 67.5 },
            { label: 'E', arrow: '→', min: 67.5, max: 112.5 },
            { label: 'SE', arrow: '↘', min: 112.5, max: 157.5 },
            { label: 'S', arrow: '↓', min: 157.5, max: 202.5 },
            { label: 'SW', arrow: '↙', min: 202.5, max: 247.5 },
            { label: 'W', arrow: '←', min: 247.5, max: 292.5 },
            { label: 'NW', arrow: '↖', min: 292.5, max: 337.5 },
            { label: 'N', arrow: '↑', min: 337.5, max: 360 }
        ];

        // Initialize
        function init() {
            loadTheme();
            loadHistory();
            setupEventListeners();
        }

        // Theme toggle
        function loadTheme() {
            const savedTheme = localStorage.getItem('sniperTheme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                themeToggle.setAttribute('data-active', 'false');
                localStorage.setItem('sniperTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
                localStorage.setItem('sniperTheme', 'dark');
            }
        }

        // Calculate distance and bearing
        function calculate() {
            // Get values
            const zA = zoneA.value.toUpperCase();
            const sA = squareA.value.toUpperCase();
            const eA = parseInt(eastingA.value) || 0;
            const nA = parseInt(northingA.value) || 0;
            const zB = zoneB.value.toUpperCase();
            const sB = squareB.value.toUpperCase();
            const eB = parseInt(eastingB.value) || 0;
            const nB = parseInt(northingB.value) || 0;

            // Validation
            if (!zA || !sA || !eA || !nA || !zB || !sB || !eB || !nB) {
                alert('Please fill in all fields');
                return;
            }

            // Check if same zone and square
            if (zA !== zB || sA !== sB) {
                alert('Points must be in the same zone and square');
                return;
            }

            // Convert to meters (4 digits = 10m resolution, add implied 0)
            const eastA = eA * 10;
            const northA = nA * 10;
            const eastB = eB * 10;
            const northB = nB * 10;

            // Calculate distance
            const dEasting = eastB - eastA;
            const dNorthing = northB - northA;
            const distance = Math.round(Math.sqrt(dEasting * dEasting + dNorthing * dNorthing));

            // Calculate bearing in radians
            const bearingRad = Math.atan2(dEasting, dNorthing);
            
            // Convert to degrees (0-360, clockwise from North)
            let bearingDeg = (bearingRad * 180 / Math.PI);
            if (bearingDeg < 0) bearingDeg += 360;

            // Convert to mils (0-6400, clockwise from North)
            const bearingMils = Math.round(bearingDeg * 6400 / 360);

            // Get direction
            const direction = directions.find(d => bearingDeg >= d.min && bearingDeg < d.max) || directions[0];

            // Display results
            distanceValue.textContent = distance + ' m';
            bearingValue.innerHTML = `${bearingMils} mils (${bearingDeg.toFixed(1)}°) <span class="direction-arrow">${direction.arrow}</span> ${direction.label}`;
            resultDisplay.style.display = 'block';

            // Save to history
            saveToHistory({
                coordA: `${zA} ${sA} ${eA} ${nA}`,
                coordB: `${zB} ${sB} ${eB} ${nB}`,
                distance: distance,
                bearing: bearingMils,
                bearingDeg: bearingDeg.toFixed(1),
                direction: direction
            });
        }

        // Save calculation to history
        function saveToHistory(calculation) {
            let history = JSON.parse(localStorage.getItem('mgrsHistory') || '[]');
            history.unshift(calculation);
            if (history.length > 5) history = history.slice(0, 5);
            localStorage.setItem('mgrsHistory', JSON.stringify(history));
            displayHistory();
        }

        // Load and display history
        function loadHistory() {
            displayHistory();
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('mgrsHistory') || '[]');
            
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-history">No calculations yet</div>';
                clearHistoryBtn.style.display = 'none';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-coords">${item.coordA} → ${item.coordB}</div>
                    <div class="history-result">${item.distance}m</div>
                    <div class="history-bearing">${item.bearing} mils ${item.direction.arrow}</div>
                </div>
            `).join('');

            clearHistoryBtn.style.display = 'block';
        }

        // Clear history
        function clearHistory() {
            localStorage.removeItem('mgrsHistory');
            displayHistory();
        }

        // Setup event listeners
        function setupEventListeners() {
            calculateBtn.addEventListener('click', calculate);
            clearHistoryBtn.addEventListener('click', clearHistory);
            themeToggle.addEventListener('click', toggleTheme);

            // Allow Enter key to calculate
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') calculate();
                });
            });
        }

        // Initialize
        init();
    </script>
</body>
</html>
