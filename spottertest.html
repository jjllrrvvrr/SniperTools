<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Tools - Spotter Test</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .spotter-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        .spotter-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #gameCanvas {
            background-color: #e0e0e0;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            margin: 10px auto;
            display: block;
            max-width: 100%;
            height: auto;
        }
        
        .game-controls {
            margin: 10px 0;
        }
        
        #message {
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: 600;
            margin: 15px 0;
            min-height: 30px;
        }
        
        #results {
            margin-top: 20px;
            padding: 20px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--text-color);
            text-align: left;
            min-height: 100px;
        }
        
        #results:empty {
            display: none;
        }
        
        /* Button text color in dark mode */
        [data-theme="dark"] #startBtn {
            color: #1a1a1a;
        }
        
        .correction {
            color: var(--accent-color);
            font-weight: 700;
        }
        
        /* Pill buttons */
        .target-selector {
            margin-bottom: 20px;
        }
        
        .target-selector label,
        .config-section label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .pill-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .pill-btn, .time-btn, .mode-btn {
            padding: 10px 25px;
            border: 2px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-secondary);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pill-btn:hover, .time-btn:hover, .mode-btn:hover {
            border-color: var(--accent-color);
            color: var(--text-color);
        }

        .pill-btn.active, .time-btn.active, .mode-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--bg-color);
        }
        
        /* Config panel */
        .spotter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 0;
        }
        
        .spotter-header .spacer {
            width: 24px;
            height: 24px;
        }
        
        .config-toggle-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
            fill: var(--text-secondary);
        }
        
        .config-toggle-icon:hover {
            transform: rotate(90deg);
            fill: var(--accent-color);
        }
        
        .config-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease;
            background-color: var(--bg-color);
            border: 0;
            margin: 0;
            padding: 0 20px;
        }

        .config-panel.open {
            max-height: 400px;
            padding: 20px;
            margin: 10px 0;
        }
        
        .config-section {
            margin-bottom: 15px;
        }
        
        .config-section:last-child {
            margin-bottom: 0;
        }
        
        .config-actions {
            margin-top: 20px;
            text-align: center;
        }

        .reset-config-btn {
            padding: 8px 20px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-config-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        @media (max-width: 768px) {
            #gameCanvas {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <a href="index.html" aria-label="Back to home">
                    <img src="logo.png" alt="Logo" class="logo">
                </a>
                <div>
                    <h1>Sniper Tools</h1>
                    <div class="subtitle">Spotter Test</div>
                </div>
            </div>
            <div class="theme-toggle">
                <button class="toggle-btn" id="themeToggle" data-active="false" aria-label="Toggle dark mode"><span class="slider"></span></button>
            </div>
        </header>

        <div class="card">
            <div class="spotter-container">
                <div class="spotter-header">
                    <div class="spacer"></div>
                    <div class="spotter-title">Spotter Test</div>
                    <svg class="config-toggle-icon" id="configToggle" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-label="Configure test settings">
                        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.04.34-.07.67-.07 1 0 .33.03.66.07.97l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.38-2.65c.61-.25 1.17-.59-1.69-.98l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63z"/>
                    </svg>
                </div>
                
                <!-- Config Panel -->
                <div class="config-panel" id="configPanel">
                    <div class="config-section">
                        <label>Mode</label>
                        <div class="pill-buttons">
                            <button class="mode-btn active" data-mode="single">Single shot</button>
                            <button class="mode-btn" data-mode="double">Double shot</button>
                        </div>
                    </div>
                    <div class="config-section">
                        <label>Number of targets</label>
                        <div class="pill-buttons">
                            <button class="pill-btn" data-count="10">10</button>
                            <button class="pill-btn" data-count="25">25</button>
                            <button class="pill-btn active" data-count="50">50</button>
                            <button class="pill-btn" data-count="100">100</button>
                        </div>
                    </div>
                    <div class="config-section">
                        <label>Display time</label>
                        <div class="pill-buttons">
                            <button class="time-btn" data-time="1">1s</button>
                            <button class="time-btn" data-time="2">2s</button>
                            <button class="time-btn active" data-time="3">3s</button>
                            <button class="time-btn" data-time="4">4s</button>
                            <button class="time-btn" data-time="5">5s</button>
                        </div>
                    </div>
                    <div class="config-actions">
                        <button class="reset-config-btn" id="resetConfigBtn">Reset</button>
                    </div>
                </div>
                
                <div class="game-controls">
                    <button class="btn" id="startBtn" onclick="startGame()">START</button>
                </div>
                
                <div id="message"></div>
                
                <canvas id="gameCanvas" width="500" height="500"></canvas>
                
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        function loadTheme() {
            const savedTheme = localStorage.getItem('sniperTheme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
            }
        }

        function toggleTheme() {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                themeToggle.setAttribute('data-active', 'false');
                localStorage.setItem('sniperTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
                localStorage.setItem('sniperTheme', 'dark');
            }
        }

        themeToggle.addEventListener('click', toggleTheme);

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const center = {x: 250, y: 250};
        const mil = 37.5;

        const zone0 = {w: 1*mil, h: 1*mil};
        const zone3 = {w: 3*mil, h: 4.5*mil};
        const zone6 = {w: 4.5*mil, h: 6*mil};

        let results = [];
        let isRunning = false;
        let abortController = null;
        let targetCount = 50;
        let displayTime = 3;
        let gameMode = 'single';

        // Config panel toggle
        document.getElementById('configToggle').addEventListener('click', () => {
            document.getElementById('configPanel').classList.toggle('open');
        });

        // Game mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameMode = btn.dataset.mode;
                
                // Pour le double shot, temps par défaut = 2 secondes
                if (gameMode === 'double') {
                    displayTime = 2;
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector('.time-btn[data-time="2"]').classList.add('active');
                }
            });
        });

        // Target count buttons
        document.querySelectorAll('.pill-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                targetCount = parseInt(btn.dataset.count);
            });
        });

        // Display time buttons
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                displayTime = parseInt(btn.dataset.time);
            });
        });

        // Reset config button
        document.getElementById('resetConfigBtn').addEventListener('click', () => {
            // Reset to defaults
            gameMode = 'single';
            targetCount = 50;
            displayTime = 3;

            // Update UI - Mode
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.mode-btn[data-mode="single"]').classList.add('active');

            // Update UI - Target count
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.pill-btn[data-count="50"]').classList.add('active');

            // Update UI - Display time
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.time-btn[data-time="3"]').classList.add('active');
        });

        function drawReticle() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const crosshairColor = isDark ? 'rgba(255, 255, 255, 0.8)' : 'rgba(0, 0, 0, 0.7)';
            const tickColor = isDark ? 'rgba(255, 255, 255, 0.6)' : 'rgba(0, 0, 0, 0.5)';
            const labelColor = isDark ? 'rgba(255, 255, 255, 0.6)' : 'rgba(0, 0, 0, 0.6)';
            const centerDotColor = isDark ? 'rgba(255, 255, 255, 0.9)' : 'rgba(0, 0, 0, 0.8)';
            const pixelsPerMil = 25; // 500 / 20
            
            // Draw crosshair lines
            ctx.strokeStyle = crosshairColor;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(center.x, 0);
            ctx.lineTo(center.x, 500);
            ctx.moveTo(0, center.y);
            ctx.lineTo(500, center.y);
            ctx.stroke();

            // Draw center dot
            ctx.beginPath();
            ctx.arc(center.x, center.y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = centerDotColor;
            ctx.fill();

            // Draw mil ticks
            ctx.strokeStyle = tickColor;

            for (let i = 1; i <= 10; i++) {
                const tickSize = (i % 5 === 0) ? 10 : 5;
                
                // Vertical ticks
                ctx.beginPath();
                ctx.moveTo(center.x - tickSize, center.y + i * pixelsPerMil);
                ctx.lineTo(center.x + tickSize, center.y + i * pixelsPerMil);
                ctx.moveTo(center.x - tickSize, center.y - i * pixelsPerMil);
                ctx.lineTo(center.x + tickSize, center.y - i * pixelsPerMil);
                ctx.stroke();

                // Horizontal ticks
                ctx.beginPath();
                ctx.moveTo(center.x + i * pixelsPerMil, center.y - tickSize);
                ctx.lineTo(center.x + i * pixelsPerMil, center.y + tickSize);
                ctx.moveTo(center.x - i * pixelsPerMil, center.y - tickSize);
                ctx.lineTo(center.x - i * pixelsPerMil, center.y + tickSize);
                ctx.stroke();
            }
        }

        function drawTargetBorder() {
            ctx.fillStyle = "#555";
            ctx.fillRect(
                center.x - zone3.w/2,
                center.y - zone3.h/2,
                zone3.w,
                zone3.h
            );
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.strokeRect(
                center.x - zone3.w/2,
                center.y - zone3.h/2,
                zone3.w,
                zone3.h
            );
        }

        function drawShot(shot) {
            ctx.beginPath();
            ctx.arc(shot.x, shot.y, 6, 0, Math.PI*2);
            ctx.fillStyle = "red";
            ctx.fill();
        }

        function generateShot() {
            function gaussianRandom() {
                let u = 0, v = 0;
                while(u === 0) u = Math.random();
                while(v === 0) v = Math.random();
                return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            }
            const stdDev = 2.5 * mil;
            let x = center.x + gaussianRandom() * stdDev;
            let y = center.y + gaussianRandom() * stdDev;
            const padding = 20;
            x = Math.max(padding, Math.min(500 - padding, x));
            y = Math.max(padding, Math.min(500 - padding, y));
            return {x, y};
        }

        function getCorrection(shot) {
            let dx = shot.x - center.x;
            let dy = shot.y - center.y;
            
            let milX = Math.abs(dx) / mil;
            let milY = Math.abs(dy) / mil;
            
            if (milX <= 0.5 && milY <= 0.5)
                return "/";
            
            return buildCorrection(dx, dy, milX, milY);
        }

        function buildCorrection(dx, dy, milX, milY) {
            let horiz = "/";
            let vert = "/";
            
            if (milX > 0.5) {
                let valX = milX <= 1.5 ? 3 : milX <= 2.25 ? 6 : 12;
                horiz = dx > 0 ? "L" + valX : "R" + valX;
            }
            
            if (milY > 0.5) {
                let valY = milY <= 2.25 ? 3 : milY <= 3 ? 6 : 12;
                vert = dy > 0 ? "U" + valY : "D" + valY;
            }
            
            if (vert === "/" && horiz === "/") return "/";
            return vert + " " + horiz;
        }

        function wait(ms) {
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(resolve, ms);
                if (abortController) {
                    abortController.signal.addEventListener('abort', () => {
                        clearTimeout(timeout);
                        reject(new Error('Aborted'));
                    }, { once: true });
                }
            });
        }

        async function startGame() {
            if (isRunning) {
                stopGame();
                return;
            }

            isRunning = true;
            abortController = new AbortController();
            results = [];
            document.getElementById("results").innerHTML = "";
            document.getElementById("startBtn").textContent = "STOP";
            document.getElementById("startBtn").style.backgroundColor = "#e74c3c";

            try {
                document.getElementById("message").innerText = "Spotter ready...";
                await wait(1000);
                if (!isRunning) return;

                document.getElementById("message").innerText = "Sniper ready...";
                await wait(1000);
                if (!isRunning) return;

                document.getElementById("message").innerText = "FIRE!";
                await wait(800);
                if (!isRunning) return;

                for (let i = 0; i < targetCount; i++) {
                    if (!isRunning) return;

                    ctx.clearRect(0, 0, 500, 500);
                    drawTargetBorder();
                    drawReticle();

                    // First shot
                    let shot1 = generateShot();
                    drawShot(shot1);
                    let correction1 = getCorrection(shot1);

                    await wait(displayTime * 1000);
                    if (!isRunning) return;

                    if (gameMode === 'double') {
                        // Second shot (clear canvas, only show shot 2)
                        ctx.clearRect(0, 0, 500, 500);
                        drawTargetBorder();
                        drawReticle();

                        let shot2 = generateShot();
                        drawShot(shot2);
                        let correction2 = getCorrection(shot2);

                        await wait(displayTime * 1000);
                        if (!isRunning) return;

                        // Combine both corrections
                        results.push(`Shot ${i+1}: <span class="correction">${correction1}; ${correction2}</span>`);
                    } else {
                        // Single shot mode
                        results.push(`Shot ${i+1}: <span class="correction">${correction1}</span>`);
                    }
                    
                    ctx.clearRect(0, 0, 500, 500);
                    await wait(500);
                    if (!isRunning) return;
                }

                document.getElementById("message").innerText = "Test Complete";
                document.getElementById("results").innerHTML = results.join("<br>");
            } catch (e) {
                if (e.message === 'Aborted') {
                    return;
                }
                throw e;
            } finally {
                isRunning = false;
                abortController = null;
                const btn = document.getElementById("startBtn");
                btn.textContent = "START";
                btn.style.backgroundColor = "";
            }
        }

        function stopGame() {
            isRunning = false;
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            resetGame();
        }

        function resetGame() {
            isRunning = false;
            abortController = null;
            ctx.clearRect(0, 0, 500, 500);
            drawTargetBorder();
            drawReticle();
            document.getElementById("message").innerText = "";
            document.getElementById("results").innerHTML = "";
            const btn = document.getElementById("startBtn");
            btn.textContent = "START";
            btn.style.backgroundColor = "";
        }

        drawTargetBorder();
        drawReticle();
        loadTheme();
    </script>
</body>
</html>
