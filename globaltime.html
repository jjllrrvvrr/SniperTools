<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Tools - Global Time</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sniper Tools">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        .globaltime-controls {
            display: flex;
            gap: var(--space-md);
            align-items: center;
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
        }

        .globaltime-controls span {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid des horloges */
        #clocks-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--space-lg);
        }

        /* Style d'une carte d'horloge */
        .clock-card {
            background-color: var(--bg-color);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            position: relative;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .clock-card:hover {
            border-color: var(--text-primary);
            transform: translateY(-3px);
        }

        .clock-card .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.2s ease;
        }

        .clock-card .remove-btn:hover {
            color: var(--danger-color);
        }

        .clock-card .selector-group {
            margin-bottom: var(--space-md);
            margin-top: var(--space-sm);
        }

        .clock-card .form-select {
            width: 100%;
        }

        /* Affichage digital style 7 segments */
        .clock-display {
            font-family: 'Orbitron', sans-serif;
            background-color: #000;
            color: #00ff41;
            font-size: var(--text-xl);
            padding: var(--space-md);
            border-radius: var(--radius-sm);
            border: 3px solid var(--border);
            display: block;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
            margin-bottom: var(--space-sm);
        }

        /* Rouge en mode sombre */
        [data-theme="dark"] .clock-display {
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            border-color: #333;
        }

        .zone-label {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: var(--space-sm);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #clocks-container {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: var(--space-md);
            }

            .clock-display {
                font-size: var(--text-lg);
                padding: var(--space-sm);
            }
        }

        @media (max-width: 480px) {
            #clocks-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <a href="index.html" aria-label="Back to home">
                    <img src="logo.png" alt="Logo" class="logo">
                </a>
                <div>
                    <h1>Sniper Tools</h1>
                    <div class="subtitle">Global Time</div>
                </div>
            </div>
            <div class="theme-toggle">
                <button class="toggle-btn" id="themeToggle" data-active="false" aria-label="Toggle dark mode"><span class="slider"></span></button>
            </div>
        </header>

        <div class="card">
            <div class="globaltime-controls">
                <button class="btn" onclick="addClock()">+ Add Clock</button>
            </div>

            <div id="clocks-container">
                <!-- Les horloges s'ajouteront ici -->
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        function loadTheme() {
            const savedTheme = localStorage.getItem('sniperTheme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
            }
        }

        function toggleTheme() {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                themeToggle.setAttribute('data-active', 'false');
                localStorage.setItem('sniperTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.setAttribute('data-active', 'true');
                localStorage.setItem('sniperTheme', 'dark');
            }
        }

        themeToggle.addEventListener('click', toggleTheme);

        // Liste des fuseaux horaires disponibles
        const timezones = [
            { name: "Local Time", value: "local" },
            { name: "UTC (GMT)", value: "UTC" },
            { name: "New York (EST)", value: "America/New_York" },
            { name: "London (GMT)", value: "Europe/London" },
            { name: "Paris (CET)", value: "Europe/Paris" },
            { name: "Berlin (CET)", value: "Europe/Berlin" },
            { name: "Moscow (MSK)", value: "Europe/Moscow" },
            { name: "Dubai (GST)", value: "Asia/Dubai" },
            { name: "Mumbai (IST)", value: "Asia/Kolkata" },
            { name: "Bangkok (ICT)", value: "Asia/Bangkok" },
            { name: "Singapore (SGT)", value: "Asia/Singapore" },
            { name: "Hong Kong (HKT)", value: "Asia/Hong_Kong" },
            { name: "Tokyo (JST)", value: "Asia/Tokyo" },
            { name: "Seoul (KST)", value: "Asia/Seoul" },
            { name: "Sydney (AEST)", value: "Australia/Sydney" },
            { name: "Auckland (NZST)", value: "Pacific/Auckland" },
            { name: "Los Angeles (PST)", value: "America/Los_Angeles" },
            { name: "Chicago (CST)", value: "America/Chicago" },
            { name: "Denver (MST)", value: "America/Denver" },
            { name: "São Paulo (BRT)", value: "America/Sao_Paulo" },
            { name: "Buenos Aires (ART)", value: "America/Argentina/Buenos_Aires" }
        ];

        function addClock(defaultTimezone = 'local') {
            const container = document.getElementById('clocks-container');
            
            // Création de l'élément carte
            const card = document.createElement('div');
            card.className = 'clock-card';
            
            // ID unique pour cette instance d'horloge
            const clockId = 'clock-' + Date.now();

            // Génération du menu déroulant avec sélection par défaut
            let optionsHtml = timezones.map(tz => 
                `<option value="${tz.value}" ${tz.value === defaultTimezone ? 'selected' : ''}>${tz.name}</option>`
            ).join('');

            card.innerHTML = `
                <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
                <div class="selector-group">
                    <select class="form-select tz-selector">
                        ${optionsHtml}
                    </select>
                </div>
                <div class="clock-display" id="${clockId}">00:00:00</div>
                <div class="zone-label">Select Time Zone</div>
            `;

            container.appendChild(card);

            // On ajoute l'écouteur d'événement sur le select pour mettre à jour le label
            const select = card.querySelector('.tz-selector');
            select.addEventListener('change', () => {
                card.querySelector('.zone-label').textContent = select.options[select.selectedIndex].text;
            });

            // Initialisation du label avec la timezone sélectionnée
            const selectedOption = timezones.find(tz => tz.value === defaultTimezone);
            card.querySelector('.zone-label').textContent = selectedOption ? selectedOption.name : select.options[select.selectedIndex].text;
        }

        // Fonction globale qui met à jour TOUTES les horloges présentes à l'écran
        function updateAllClocks() {
            const clockCards = document.querySelectorAll('.clock-card');
            const now = new Date();

            clockCards.forEach(card => {
                const select = card.querySelector('.tz-selector');
                const display = card.querySelector('.clock-display');
                const selectedZone = select.value;

                let options = {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                };

                if (selectedZone !== 'local') {
                    options.timeZone = selectedZone;
                }

                try {
                    const formatter = new Intl.DateTimeFormat('en-GB', options);
                    display.textContent = formatter.format(now);
                } catch (e) {
                    display.textContent = "Error";
                }
            });
        }

        // Lancement du cycle de mise à jour (1 seconde)
        setInterval(updateAllClocks, 1000);

        // Ajouter deux horloges par défaut au démarrage
        window.onload = () => {
            loadTheme();
            addClock('UTC');           // Horloge 1: UTC
            addClock('Europe/Brussels'); // Horloge 2: Brussels
        };
    </script>
</body>
</html>
